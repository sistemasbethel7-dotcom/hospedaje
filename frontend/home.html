<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Inicio · Anfitriones</title>
<meta name="theme-color" content="#A8832E">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..500,0..1,-25..0" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/home.css">
</head>
<body>
<main class="home-screen">
  <h1 class="home-app-title">Hospedaje</h1>

  <div class="home-greeting">
    <p class="label-caps" id="home-role"></p>
    <h2 class="home-title" id="home-greeting-name">Hola</h2>
  </div>

  <div class="home-grid">
    <button class="home-tile" id="qa-hogar" hidden>
      <span class="material-symbols-outlined">add_home</span>
      <span class="tile-label">Registrar hogar</span>
    </button>
    <button class="home-tile" id="qa-ingresos" hidden>
      <span class="material-symbols-outlined">how_to_reg</span>
      <span class="tile-label">Registrar ingresos</span>
    </button>
    <button class="home-tile" id="menu-hogares">
      <span class="material-symbols-outlined">holiday_village</span>
      <span class="tile-label">Ver hogares registrados</span>
    </button>
  </div>

  <button class="home-logout-fab" id="logout-btn" aria-label="Cerrar sesión">
    <span class="material-symbols-outlined">logout</span>
  </button>
</main>

<script type="module" src="js/pages/home.js"></script>
</body>
</html>
