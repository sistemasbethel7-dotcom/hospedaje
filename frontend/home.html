<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Inicio · Anfitriones</title>
<meta name="theme-color" content="#A8832E">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..500,0..1,-25..0" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/eventos.css">
<link rel="stylesheet" href="css/home.css">
</head>
<body>
<main class="home-screen">
  <h1 class="home-app-title">Hospedaje</h1>

  <div class="home-greeting">
    <p class="label-caps" id="home-role"></p>
    <h2 class="home-title" id="home-greeting-name">Hola</h2>
  </div>

  <div class="home-evento card-bordered" id="home-evento" hidden>
    <div class="home-evento-nombre" id="evento-nombre"></div>
    <div class="home-evento-fechas" id="evento-fechas"></div>
    <div class="home-evento-stats" id="evento-stats" hidden>
      <div class="evento-stat"><span class="evento-stat-valor" id="evento-stat-hogares"></span><span class="evento-stat-label">Hogares</span></div>
      <div class="evento-stat"><span class="evento-stat-valor" id="evento-stat-ocupacion"></span><span class="evento-stat-label">Ocupación</span></div>
    </div>
    <div class="home-evento-links">
      <button type="button" class="home-evento-cambiar" id="cambiar-evento-btn">Cambiar evento</button>
      <a href="admin/dashboard.html" class="home-evento-cambiar" id="volver-dashboard-link" hidden>Volver al dashboard</a>
    </div>
  </div>

  <div class="home-grid">
    <button class="home-tile" id="qa-hogar" hidden>
      <span class="material-symbols-outlined">add_home</span>
      <span class="tile-label">Registrar hogar</span>
    </button>
    <button class="home-tile" id="qa-ingresos" hidden>
      <span class="material-symbols-outlined">how_to_reg</span>
      <span class="tile-label">Registrar ingresos</span>
    </button>
    <button class="home-tile" id="menu-hogares">
      <span class="material-symbols-outlined">holiday_village</span>
      <span class="tile-label">Ver hogares registrados</span>
    </button>
  </div>

  <button class="home-logout-fab" id="logout-btn" aria-label="Cerrar sesión">
    <span class="material-symbols-outlined">logout</span>
  </button>
</main>

<script type="module" src="js/pages/home.js"></script>
</body>
</html>
