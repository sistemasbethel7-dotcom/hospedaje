<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Registrar ingresos · Anfitriones</title>
<meta name="theme-color" content="#A8832E">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/hogares.css">
<link rel="stylesheet" href="css/ingresos.css">
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
<div class="screen">
  <header class="screen-header">
    <button type="button" class="screen-back" id="back-btn" aria-label="Volver">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="screen-heading">Registrar ingresos</span>
  </header>
  <p class="evento-context" id="evento-context"></p>

  <div class="ingresos-toolbar">
    <button type="button" class="ingresos-toolbar-btn" id="filtros-toggle-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M7 12h10M10 18h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Filtros
    </button>
    <button type="button" class="ingresos-toolbar-btn" id="escanear-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 8V5a1 1 0 011-1h3M20 8V5a1 1 0 00-1-1h-3M4 16v3a1 1 0 001 1h3M20 16v3a1 1 0 01-1 1h-3M4 12h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Escanear QR
    </button>
  </div>

  <div class="ingresos-filtros" id="ingresos-filtros" hidden>
    <input type="text" id="filtro-folio" placeholder="Folio">
    <input type="text" id="filtro-colonia" placeholder="Colonia">
    <input type="text" id="filtro-cp" placeholder="Código postal">
    <input type="text" id="filtro-estado" placeholder="Estado">
    <select id="filtro-ocupacion">
      <option value="">Todas las ocupaciones</option>
      <option value="libre">Libre</option>
      <option value="parcial">Parcial</option>
      <option value="lleno">Lleno</option>
    </select>
  </div>

  <p class="form-error" id="ingresos-list-error" role="alert"></p>
  <p class="hogares-empty" id="ingresos-sin-resultados" hidden>Ningún hogar coincide con el filtro.</p>
  <div class="hogares-list" id="hogares-list"></div>

  <div class="ingresos-panel" id="ingresos-panel" hidden>
    <div class="ingresos-panel-nombre" id="panel-nombre"></div>
    <div class="ingresos-panel-sub" id="panel-sub"></div>
    <div class="stepper">
      <button type="button" id="ingreso-menos" aria-label="Restar">–</button>
      <input type="number" id="ingreso-valor" inputmode="numeric" min="1" value="1" aria-label="Cantidad">
      <button type="button" id="ingreso-mas" aria-label="Sumar">+</button>
    </div>
    <p class="form-error" id="ingreso-error" role="alert"></p>
    <button type="button" class="btn-gold" id="confirmar-btn">Registrar ingreso</button>
  </div>
</div>

<div class="qr-modal" id="qr-modal" hidden>
  <div class="qr-modal-header">
    <button type="button" class="screen-back" id="qr-modal-close" aria-label="Cerrar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <span class="screen-heading">Escanear QR de la casa</span>
  </div>
  <div id="qr-reader"></div>
  <p class="form-error" id="qr-error" role="alert"></p>
</div>

<script type="module" src="js/pages/ingresos.js"></script>
</body>
</html>
