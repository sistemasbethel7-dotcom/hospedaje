<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Crear contraseña · Anfitriones</title>
<meta name="theme-color" content="#A8832E">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/login.css">
</head>
<body>
<main class="login-screen">
  <div class="login-emblem">
    <div class="login-emblem-inner"><span>100</span></div>
  </div>
  <p class="login-kicker">Aniversario</p>
  <h1 class="login-title">Crea tu contraseña</h1>
  <p class="login-subtitle" id="set-password-email"></p>

  <form class="login-form card-bordered" id="set-password-form" novalidate hidden>
    <div class="field">
      <label class="label-caps" for="password">Contraseña</label>
      <input type="password" id="password" name="password" autocomplete="new-password" placeholder="••••••••" required>
    </div>
    <div class="field">
      <label class="label-caps" for="password-confirm">Confirmar contraseña</label>
      <input type="password" id="password-confirm" name="password-confirm" autocomplete="new-password" placeholder="••••••••" required>
    </div>
    <p class="form-error" id="set-password-error" role="alert"></p>
    <button type="submit" class="btn-gold" id="set-password-submit">Guardar y entrar</button>
  </form>

  <p class="form-error" id="set-password-invalid" role="alert" hidden></p>

  <p class="login-footer">Congregación Mundial · Centenario</p>
</main>

<script type="module" src="js/pages/set-password.js"></script>
</body>
</html>
