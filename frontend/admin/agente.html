<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agente · Anfitriones</title>
<meta name="theme-color" content="#A8832E">
<link rel="manifest" href="../manifest.json">
<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/registro.css">
<link rel="stylesheet" href="../css/eventos.css">
<link rel="stylesheet" href="../css/admin.css">
<link rel="stylesheet" href="../css/agent.css">
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-title">Hospedaje</div>
    <nav class="admin-nav">
      <a href="dashboard.html" class="admin-nav-link">Dashboard</a>
      <a href="hogares.html" class="admin-nav-link">Hogares</a>
      <a href="mapa.html" class="admin-nav-link">Mapa</a>
      <a href="eventos.html" class="admin-nav-link">Eventos</a>
      <a href="catalogos.html" class="admin-nav-link" id="nav-catalogos">Catálogos</a>
      <a href="usuarios.html" class="admin-nav-link" id="nav-usuarios">Usuarios</a>
      <a href="agente.html" class="admin-nav-link active" id="nav-agente">Agente</a>
    </nav>
    <div class="admin-sidebar-footer">
      <a href="../eventos.html" class="admin-nav-link">Modo campo</a>
      <button type="button" class="admin-nav-link" id="logout-btn">Cerrar sesión</button>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-page-header">
      <h1 class="admin-page-title">Agente de voz</h1>
    </div>
    <p class="admin-page-desc">Controla el asistente de voz que aparece en el panel: enciéndelo o apágalo, elige su voz y ajusta el acento o estilo con el que habla.</p>

    <p class="admin-error" id="agente-error" role="alert"></p>
    <p class="admin-empty" id="agente-exito" hidden>Configuración guardada.</p>

    <form class="admin-inline-form" id="agente-form">
      <div class="field">
        <label class="label-caps admin-checkbox-label" for="agente-habilitado-check">
          <input type="checkbox" id="agente-habilitado-check">
          Agente habilitado
        </label>
      </div>
      <div class="field">
        <label class="label-caps" for="agente-voz-select">Voz</label>
        <select id="agente-voz-select">
          <option value="marin">Marin (recomendada)</option>
          <option value="cedar">Cedar (recomendada)</option>
          <option value="alloy">Alloy</option>
          <option value="ash">Ash</option>
          <option value="ballad">Ballad</option>
          <option value="coral">Coral</option>
          <option value="echo">Echo</option>
          <option value="sage">Sage</option>
          <option value="shimmer">Shimmer</option>
          <option value="verse">Verse</option>
        </select>
      </div>
      <div class="field">
        <label class="label-caps" for="agente-acento-input">Acento o estilo (opcional)</label>
        <textarea id="agente-acento-input" rows="3" placeholder="Ej. Usa un acento neutro, evita modismos regionales."></textarea>
      </div>
      <button type="submit" class="admin-btn" id="agente-guardar-btn">Guardar</button>
    </form>
  </main>

</div>

<script type="module">
  import { mountShellOnce } from '../js/adminShell.js';
  mountShellOnce();
</script>
<script type="module" src="../js/pages/admin-agente.js"></script>
</body>
</html>
