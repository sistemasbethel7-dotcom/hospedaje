<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Usuarios · Anfitriones</title>
<meta name="theme-color" content="#A8832E">
<link rel="manifest" href="../manifest.json">
<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..500,0..1,-25..0" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/registro.css">
<link rel="stylesheet" href="../css/eventos.css">
<link rel="stylesheet" href="../css/admin.css">
<link rel="stylesheet" href="../css/agent.css">
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-title">Hospedaje</div>
    <nav class="admin-nav">
      <a href="dashboard.html" class="admin-nav-link">Dashboard</a>
      <a href="hogares.html" class="admin-nav-link">Hogares</a>
      <a href="mapa.html" class="admin-nav-link">Mapa</a>
      <a href="eventos.html" class="admin-nav-link">Eventos</a>
      <a href="catalogos.html" class="admin-nav-link">Catálogos</a>
      <a href="usuarios.html" class="admin-nav-link active">Usuarios</a>
      <a href="agente.html" class="admin-nav-link" id="nav-agente">Agente</a>
    </nav>
    <div class="admin-sidebar-footer">
      <a href="../eventos.html" class="admin-nav-link">Modo campo</a>
      <button type="button" class="admin-nav-link" id="logout-btn">Cerrar sesión</button>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-page-header">
      <h1 class="admin-page-title">Usuarios</h1>
      <div class="admin-page-actions">
        <button type="button" class="admin-btn" id="mostrar-form-btn">+ Crear usuario</button>
      </div>
    </div>

    <p class="admin-error" id="usuarios-error" role="alert"></p>

    <form class="admin-inline-form" id="usuario-form" hidden>
      <div class="field">
        <label class="label-caps" for="nuevo-nombre">Nombre</label>
        <input type="text" id="nuevo-nombre" placeholder="Opcional">
      </div>
      <div class="field">
        <label class="label-caps" for="nuevo-email">Correo</label>
        <input type="email" id="nuevo-email" required>
      </div>
      <div class="field">
        <label class="label-caps" for="nuevo-telefono">Teléfono</label>
        <input type="tel" id="nuevo-telefono" placeholder="Opcional">
      </div>
      <div class="field">
        <label class="label-caps" for="nuevo-role">Rol</label>
        <select id="nuevo-role">
          <option value="agente">Agente</option>
          <option value="supervisor">Supervisor</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button type="button" class="admin-btn" id="guardar-usuario-btn">Guardar</button>
    </form>

    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Teléfono</th>
            <th>Rol</th>
            <th>Estatus</th>
            <th>Creado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="usuarios-tbody"></tbody>
      </table>
    </div>
  </main>

</div>

<script type="module">
  import { mountShellOnce } from '../js/adminShell.js';
  mountShellOnce();
</script>
<script type="module" src="../js/pages/admin-usuarios.js"></script>
</body>
</html>
