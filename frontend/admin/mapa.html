<link rel="stylesheet" href="../css/agent.css">

<body>
<div class="admin-shell">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-title">Hospedaje</div>
    <nav class="admin-nav">
      <a href="dashboard.html" class="admin-nav-link">Dashboard</a>
      <a href="hogares.html" class="admin-nav-link">Hogares</a>
      <a href="mapa.html" class="admin-nav-link active">Mapa</a>
      <a href="eventos.html" class="admin-nav-link">Eventos</a>
      <a href="catalogos.html" class="admin-nav-link" id="nav-catalogos">Catálogos</a>
      <a href="usuarios.html" class="admin-nav-link" id="nav-usuarios">Usuarios</a>
      <a href="agente.html" class="admin-nav-link" id="nav-agente">Agente</a>
    </nav>
    <div class="admin-sidebar-footer">
      <a href="../eventos.html" class="admin-nav-link">Modo campo</a>
      <button type="button" class="admin-nav-link" id="logout-btn">Cerrar sesión</button>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-page-header">
      <h1 class="admin-page-title">Mapa</h1>
      <div class="admin-page-actions">
        <span class="admin-live-indicator" id="live-indicator" hidden>
          <span class="admin-live-dot"></span>
          <span id="live-indicator-text">En vivo</span>
        </span>
        <select class="admin-select" id="evento-select"></select>
      </div>
    </div>

    <p class="admin-error" id="mapa-error" role="alert"></p>
    <p class="admin-empty" id="mapa-empty" hidden>Aún no hay eventos creados. <a href="eventos.html">Crea el primero</a>.</p>

    <div id="mapa-content" hidden>
      <div class="admin-mapa-legend">
        <span class="admin-mapa-legend-item"><span class="admin-mapa-dot libre"></span>Libre</span>
        <span class="admin-mapa-legend-item"><span class="admin-mapa-dot parcial"></span>Parcialmente ocupada</span>
        <span class="admin-mapa-legend-item"><span class="admin-mapa-dot lleno"></span>Llena</span>
        <span class="admin-mapa-legend-item" id="mapa-sin-ubicacion" hidden></span>
      </div>
      <div class="admin-mapa-container">
        <div id="mapa"></div>
      </div>
    </div>
  </main>

</div>

<script type="module">
  import { mountShellOnce } from '../js/adminShell.js';
  mountShellOnce();
