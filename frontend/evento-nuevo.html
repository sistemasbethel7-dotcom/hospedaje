<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nuevo evento · Anfitriones</title>
<meta name="theme-color" content="#A8832E">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/registro.css">
<link rel="stylesheet" href="css/evento-nuevo.css">
</head>
<body>
<div class="screen">
  <header class="screen-header">
    <button type="button" class="screen-back" id="back-btn" aria-label="Volver">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="screen-heading">Nuevo evento</span>
  </header>

  <form class="card-bordered evento-form" id="evento-form">
    <div class="field">
      <label class="label-caps" for="nombre">Nombre del evento</label>
      <input type="text" id="nombre" name="nombre" placeholder="Centenario 2026" required>
    </div>
    <div class="field">
      <label class="label-caps" for="sede">Sede (opcional)</label>
      <input type="text" id="sede" name="sede" placeholder="Templo Central">
    </div>
    <div class="field">
      <label class="label-caps" for="fecha_inicio">Fecha inicio</label>
      <input type="date" id="fecha_inicio" name="fecha_inicio" required>
    </div>
    <div class="field">
      <label class="label-caps" for="fecha_fin">Fecha fin</label>
      <input type="date" id="fecha_fin" name="fecha_fin" required>
    </div>
  </form>

  <p class="form-error" id="evento-error" role="alert"></p>

  <footer class="wizard-footer">
    <button type="button" class="btn-gold" id="crear-btn">Crear evento</button>
  </footer>
</div>

<script type="module" src="js/pages/evento-nuevo.js"></script>
</body>
</html>
